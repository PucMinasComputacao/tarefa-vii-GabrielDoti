<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abra o Console (F12) para ver os resultados</title>
    <script src="script.js"></script>
</head>

<body>
    <div class="card">
        <h2>Dados Iniciais</h2>
        <input type="text" id="Nome" placeholder="Seu nome">
        <input type="text" id="Renda" placeholder="Renda mensal (ex: 3000)">
        <input type="text" id="quantidade" placeholder="Qtd. de despesas (1 a 5)">

        <button onclick="gerarCamposDespesas()">Próximo</button>

        <div id="secaoDespesas">
            <hr>
            <h3>Informe os valores:</h3>
            <div id="listaInputs"></div>
            <button onclick="calcularFinal()" style="background: #28a745;">Calcular Total</button>
        </div>
        <div id="resultado"></div>
    </div>
</body>

</html>
